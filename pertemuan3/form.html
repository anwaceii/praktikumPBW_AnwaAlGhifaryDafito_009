<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Login</title>
</head>
<body>

<form action="" method="GET">

    <h2>Formulir Login</h2>

    <div>
        <label>Masukkan Nama</label><br>
        <input type="text" name="username" placeholder="Masukkan nama Anda">
    </div>
    <br>

    <div>
        <label>Deskripsikan diri lo</label><br>
        <textarea name="Deskripsi" rows="5" cols="40" placeholder="Saya adalah..."></textarea>
    </div>
    <br>

    <div>
        <label>Jenis Kelamin</label><br>
        <select name="gender">
            <option value="L">Laki-laki</option>
            <option value="P">Perempuan</option>
        </select>
    </div>
    <br>

    <div>
        <label>Pilihan</label><br>
        <input type="radio" name="pilihan" value="1"> Pilihan 1
        <input type="radio" name="pilihan" value="2"> Pilihan 2
        <input type="radio" name="pilihan" value="3"> Pilihan 3
    </div>
    <br>

    <div>
        <label>Hobi</label><br>
        <input type="checkbox" name="hobi" value="Mendengarkan Musik"> Mendengarkan Musik
        <input type="checkbox" name="hobi" value="Badminton"> Badminton
        <input type="checkbox" name="hobi" value="Membaca"> Membaca
    </div>
    <br>

    <div>
        <label>Upload File</label><br>
        <input type="file" name="file">
    </div>
    <br>

    <button type="submit">Kirim</button>
    <button type="button" onclick="alert('Halo!')">Klik saya!</button>

</form>

</body>
</html>
