<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Sederhana</title>
    <link rel="stylesheet" href="halamanformulir.css">
</head>
<body>

    <header>
        <h1>Selamat Datang di Website Sederhana Anwa</h1>

    <div class="menu">
        <a href="">Beranda</a>
        <a href="">Tentang</a>
        <a href="">Kontak</a>
        <a href="">Layanan</a>
    </div>
    </header>

    <div class="container">

        <div class="form-area">
            <h3>Formulir Pendaftaran</h3>

            <form>
                <label>Nama Lengkap</label>
                <input type="text" name="nama">

                <label>NPM</label>
                <input type="text" name="npm">

                <label>Password</label>
                <input type="password" name="password">

                <label>Jenis Kelamin</label><br>
                <input type="radio" name="jk"> Laki-laki
                <input type="radio" name="jk"> Perempuan
                <br><br>

                <label>Hobi</label><br>
                <input type="checkbox"> Mendengarkan Musik
                <input type="checkbox"> Berenang
                <input type="checkbox"> Membaca
                <br><br>

                <label>Pilih Kota</label>
                <select name="kota">
                <option value="">-- Pilih Kota --</option>
                <option value="jakarta">Jakarta</option>
                <option value="bandung">Bandung</option>
                <option value="karawang">Karawang</option>
                <option value="bekasi">Bekasi</option>
                <option value="surabaya">Surabaya</option>
                </select>

                <label>Pendidikan</label>
                <select>
                    <option>SMA</option>
                    <option>D3</option>
                    <option>S1</option>
                </select>

                <label>Pesan</label>
                <textarea rows="4"></textarea>

                <button type="submit">Kirim</button>
            </form>
        </div>

        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>Bagian ini dapat diisi dengan informasi tambahan.</p>
        </div>

    </div>

</body>
</html>
