<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Input Nilai</title>

<style>
body{
    text-align:center;
    font-family: Arial, sans-serif;
}

form{
    border:1px solid black;
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

button{
    padding:8px 15px;
    margin-top:10px;
    cursor:pointer;
}

.hasil{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-top:10px;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>Koperasi Mahasiswa</h2>

<form onsubmit="event.preventDefault(); inputNilai();">

<label>Masukkan NIM</label><br>
<input type="number" id="NPM" required>

<br><br>

<label>Masukkan Nilai Matkul</label><br>
<input type="number" id="nilai" required>

<br><br>

<button type="submit">Enter</button>

<div class="hasil">
<p>NIM =</p>
<p id="hasilnim"></p>
</div>

<div class="hasil">
<p>Nilai MK =</p>
<p id="hasilnilai"></p>
<p id="hurufmutu"></p>
</div>

</form>

<script>

function inputNilai(){

let nim = document.getElementById("NPM").value;
let nilai = document.getElementById("nilai").value;

if(nilai === "" || nim === ""){
    alert("Input harus diisi semua");
    return;
}

if(isNaN(nilai) || nilai < 0 || nilai > 100){
    alert("Masukkan nilai 0 - 100");
    return;
}

let huruf = "";
let warna = "";

if(nilai >= 80){
    huruf = "A";
    warna = "green";
}
else if(nilai >= 70){
    huruf = "B";
    warna = "blue";
}
else if(nilai >= 60){
    huruf = "C";
    warna = "orange";
}
else if(nilai >= 50){
    huruf = "D";
    warna = "purple";
}
else{
    huruf = "E";
    warna = "red";
}

document.getElementById("hasilnim").innerHTML = nim;
document.getElementById("hasilnilai").innerHTML = nilai;

let mutu = document.getElementById("hurufmutu");
mutu.innerHTML = "(Huruf Mutu = " + huruf + ")";
mutu.style.color = warna;

}

</script>

</body>
</html>
